<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Tabsla 3D</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f0f0f2;overflow:hidden;font-family:-apple-system,sans-serif}
model-viewer{width:100vw;height:100vh;--poster-color:#f0f0f2;--progress-bar-color:#3B82F6}
.tabs{position:fixed;top:8px;left:8px;z-index:10;display:flex;gap:4px}
.tab{padding:7px 16px;border-radius:8px;border:none;font-size:12px;font-weight:600;
  cursor:pointer;color:#888;background:rgba(0,0,0,.04);transition:.2s;font-family:inherit}
.tab.sel{color:#fff;background:#3B82F6}
.tab:active{transform:scale(.95)}
</style>
</head>
<body>

<div class="tabs" id="tabs">
  <button class="tab sel" onclick="sw('car',this)">Exterior</button>
  <button class="tab" onclick="sw('seat',this)">Seat</button>
</div>

<model-viewer id="mv"
  src="models/ferrari.glb"
  alt="3D Model"
  auto-rotate
  auto-rotate-delay="0"
  rotation-per-second="8deg"
  camera-controls
  touch-action="pan-y"
  shadow-intensity="1"
  shadow-softness="0.8"
  exposure="2"
  tone-mapping="commerce"
  environment-image="neutral"
  camera-orbit="30deg 65deg 3.5m"
  min-camera-orbit="auto auto 1m"
  max-camera-orbit="auto auto 10m"
  field-of-view="28deg"
  style="background-color:#f0f0f2"
></model-viewer>

<script>
const mv = document.getElementById('mv');
const cfg = {
  car:  {src:'models/ferrari.glb',   orbit:'30deg 65deg 3.5m', fov:'28deg', exp:2},
  seat: {src:'models/car-seat.glb',  orbit:'20deg 70deg 1.2m', fov:'32deg', exp:2.5},
};

function sw(id, btn) {
  const c = cfg[id];
  mv.src = c.src;
  mv.cameraOrbit = c.orbit;
  mv.fieldOfView = c.fov;
  mv.exposure = c.exp;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('sel'));
  if(btn) btn.classList.add('sel');
}

// Seat → white material
mv.addEventListener('load', ()=>{
  if(mv.src.includes('car-seat')) {
    try {
      const model = mv.model;
      if(model) {
        for(const mat of model.materials) {
          mat.pbrMetallicRoughness.setBaseColorFactor([0.95,0.92,0.88,1]);
          mat.pbrMetallicRoughness.setMetallicFactor(0);
          mat.pbrMetallicRoughness.setRoughnessFactor(0.45);
        }
      }
    } catch(e){}
  }
});

// Flutter WebView bridge
window.loadModel = function(id) {
  const btn = document.querySelector(`.tab:nth-child(${id==='car'?1:2})`);
  sw(id, btn);
};
</script>
</body>
</html>
